<style>
:root {
  --black: #000;
  --surface: #0d0d0d;
  --surface2: #141414;
  --border: #1f1f1f;
  --red: #cc0000;
  --red-bright: #ef4444;
  --red-dim: #3b0000;
  --green: #00cc44;
  --green-dim: #003311;
  --yellow: #ffcc00;
  --yellow-dim: #332800;
  --blue: #3b82f6;
  --gray: #555;
  --text: #e0e0e0;
  --text-dim: #666;
  --font: 'Courier New', 'Lucida Console', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { background:var(--black); color:var(--text); font-family:var(--font); min-height:100vh; overflow-x:hidden; }
input, select, textarea, button { font-family:var(--font); }

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:#000; }
::-webkit-scrollbar-thumb { background:var(--red); border-radius:2px; }

/* HEADER */
#header {
  position:sticky; top:0; z-index:100;
  background:linear-gradient(180deg, #1a0000 0%, #000 100%);
  border-bottom:1px solid var(--red);
  padding:10px 14px 6px;
}
#header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
#header-title { font-size:16px; font-weight:bold; color:var(--red-bright); letter-spacing:4px; text-shadow:0 0 12px #cc000088; }
#header-sub { font-size:9px; color:var(--green); letter-spacing:3px; margin-top:1px; }
#header-stats { text-align:right; }
#streak-display { font-size:12px; color:var(--yellow); font-weight:bold; }
#done-display { font-size:9px; color:var(--gray); margin-top:1px; }
#xp-bar-wrap { position:relative; height:4px; background:#1a0000; border-radius:2px; overflow:hidden; }
#xp-bar { height:100%; background:linear-gradient(90deg, var(--red) 0%, var(--red-bright) 100%); border-radius:2px; transition:width .8s ease; position:relative; }
#xp-bar::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg, transparent, rgba(255,100,100,.4), transparent); animation:xp-pulse 2s linear infinite; }
@keyframes xp-pulse { 0%{transform:translateX(-100%)} 100%{transform:translateX(200%)} }

/* TABS */
#tabs {
  display:flex; overflow-x:auto; background:#000; border-bottom:1px solid var(--border);
  position:sticky; top:72px; z-index:99;
  scrollbar-width:none;
}
#tabs::-webkit-scrollbar { display:none; }
.tab {
  flex:0 0 auto; padding:8px 14px; font-size:10px; font-family:var(--font);
  font-weight:bold; letter-spacing:1px; border:none; background:none;
  color:var(--gray); cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; transition:all .2s;
}
.tab.active { color:var(--red-bright); border-bottom-color:var(--red-bright); background:#0a0000; }
.tab:hover:not(.active) { color:#999; }

/* CONTENT */
#content { padding:12px; padding-bottom:80px; max-width:600px; margin:0 auto; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px; }
.card-red { background:var(--surface); border:1px solid var(--red-dim); border-radius:10px; padding:12px; margin-bottom:10px; }
.card-green { background:var(--surface); border:1px solid var(--green-dim); border-radius:10px; padding:12px; margin-bottom:10px; }
.card-yellow { background:var(--surface); border:1px solid var(--yellow-dim); border-radius:10px; padding:12px; margin-bottom:10px; }

.card-label { font-size:9px; letter-spacing:3px; margin-bottom:8px; font-weight:bold; }
.label-red { color:var(--red-bright); }
.label-green { color:var(--green); }
.label-yellow { color:var(--yellow); }
.label-gray { color:var(--gray); }
.label-blue { color:var(--blue); }

.divider { height:1px; background:linear-gradient(90deg, transparent, var(--red-dim), transparent); margin:10px 0; }

/* RANK CARD */
#rank-card {
  background:linear-gradient(135deg, #100000 0%, #0d0d0d 50%, #001a00 100%);
  border:1px solid var(--red); border-radius:12px; padding:16px; margin-bottom:10px;
}
#rank-name { font-size:22px; font-weight:bold; color:var(--red-bright); text-shadow:0 0 20px #cc000066; }
#rank-lvl { font-size:12px; color:var(--green); margin-top:2px; letter-spacing:2px; }
#xp-total { font-size:28px; font-weight:bold; color:var(--yellow); text-shadow:0 0 12px #ffcc0044; }
#xp-label { font-size:9px; color:var(--gray); letter-spacing:2px; }
#rank-progress-wrap { height:8px; background:#1a0a0a; border-radius:4px; overflow:hidden; border:1px solid #2a0a0a; margin-top:8px; }
#rank-progress { height:100%; border-radius:4px; transition:width 1s ease; position:relative; overflow:hidden; }
#rank-progress::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent); animation:xp-pulse 1.5s linear infinite; }
#rank-next { font-size:9px; color:var(--gray); margin-top:4px; text-align:right; }

/* STATS GRID */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 6px; text-align:center; }
.stat-val { font-size:20px; font-weight:bold; }
.stat-lbl { font-size:8px; color:var(--gray); letter-spacing:1px; margin-top:2px; }

/* TABLE */
table { width:100%; border-collapse:collapse; font-size:11px; }
th { color:var(--gray); font-size:9px; letter-spacing:1px; padding:4px 6px; text-align:left; border-bottom:1px solid var(--border); }
td { padding:6px 6px; border-bottom:1px solid #0f0f0f; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#0f0f0f; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:8px 14px; border-radius:6px; font-family:var(--font); font-size:11px; font-weight:bold; cursor:pointer; letter-spacing:1px; border:1px solid; transition:all .15s; }
.btn-red { background:#1a0000; border-color:var(--red); color:var(--red-bright); }
.btn-red:hover { background:var(--red-dim); }
.btn-green { background:var(--green-dim); border-color:var(--green); color:var(--green); }
.btn-green:hover { background:#004422; }
.btn-yellow { background:var(--yellow-dim); border-color:var(--yellow); color:var(--yellow); }
.btn-blue { background:#0a1628; border-color:var(--blue); color:var(--blue); }
.btn-gray { background:var(--surface2); border-color:var(--border); color:var(--gray); }
.btn-full { width:100%; padding:12px; font-size:12px; letter-spacing:2px; border-radius:8px; }
.btn-success { background:#003311; border-color:var(--green); color:var(--green); }

/* INPUTS */
.inp { width:100%; background:#0a0a0a; border:1px solid var(--border); border-radius:6px; padding:8px 10px; color:var(--text); font-family:var(--font); font-size:12px; outline:none; }
.inp:focus { border-color:var(--red); }
.inp-green:focus { border-color:var(--green); }
.inp-label { font-size:9px; color:var(--gray); letter-spacing:1px; margin-bottom:4px; }
.inp-group { margin-bottom:8px; }

.select { width:100%; background:#0a0a0a; border:1px solid var(--border); border-radius:6px; padding:8px 10px; color:var(--text); font-family:var(--font); font-size:12px; outline:none; appearance:none; }
.select:focus { border-color:var(--red); }

/* WORKOUT ITEM */
.workout-item { padding:10px 12px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:all .15s; }
.workout-item:hover { border-color:#333; }
.workout-item.selected { border-color:var(--red); background:#0a0000; }
.workout-item.done { opacity:.4; text-decoration:line-through; cursor:default; }
.workout-name { font-size:12px; font-weight:bold; color:var(--text); }
.workout-meta { display:flex; justify-content:space-between; margin-top:3px; font-size:9px; color:var(--gray); }

/* BADGE */
.badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:9px; font-weight:bold; letter-spacing:1px; }
.badge-red { background:#3b0000; color:var(--red-bright); border:1px solid var(--red-dim); }
.badge-green { background:var(--green-dim); color:var(--green); border:1px solid #004422; }
.badge-yellow { background:var(--yellow-dim); color:var(--yellow); border:1px solid #443300; }
.badge-blue { background:#0a1628; color:var(--blue); border:1px solid #1e3a5f; }
.badge-purple { background:#1a0d2e; color:#a855f7; border:1px solid #3b1a6e; }
.badge-orange { background:#1a0d00; color:#f97316; border:1px solid #5a2a00; }

/* STAR RATING */
.stars { display:flex; gap:4px; }
.star { flex:1; padding:6px 2px; text-align:center; border:1px solid var(--border); border-radius:4px; cursor:pointer; font-size:12px; background:#0a0a0a; transition:all .1s; }
.star.active { background:var(--yellow-dim); border-color:#666; }

/* INTENSITY */
.intensity-opts { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; }
.int-opt { padding:6px 4px; text-align:center; border:1px solid var(--border); border-radius:4px; cursor:pointer; font-size:9px; background:#0a0a0a; transition:all .1s; }
.int-opt.active { border-color:var(--red); background:#1a0000; color:var(--red-bright); }

/* EXERCISE LOG */
.ex-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #0f0f0f; font-size:11px; }
.ex-row:last-child { border-bottom:none; }
.ex-name { color:var(--text); font-weight:bold; }
.ex-vals { color:var(--gray); font-size:10px; }

/* PROGRESS BAR SMALL */
.prog-bar { height:4px; background:#1a1a1a; border-radius:2px; overflow:hidden; margin-top:4px; }
.prog-fill { height:100%; border-radius:2px; transition:width .5s ease; }

/* RANK TABLE */
.rank-row { display:flex; justify-content:space-between; align-items:center; padding:5px 8px; border-radius:4px; margin-bottom:2px; }
.rank-row.current { background:#1a0000; border:1px solid var(--red); transform:scale(1.02); }
.rank-row.done { opacity:.4; }
.rank-row.future { opacity:.2; }

/* CHECKBOX */
.check-row { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:11px; color:var(--yellow); padding:4px 0; }
.check-row input { accent-color:var(--yellow); width:14px; height:14px; }

/* NEXT SESSION BOX */
.next-box { background:#001a00; border:1px solid var(--green-dim); border-radius:6px; padding:8px 10px; margin-top:8px; }
.next-box-label { font-size:8px; color:var(--green); letter-spacing:2px; margin-bottom:3px; }
.next-box-text { font-size:10px; color:#aaa; line-height:1.5; }

/* HISTORY WORKOUT */
.hist-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
.hist-header { display:flex; justify-content:space-between; align-items:flex-start; }
.hist-name { font-size:12px; font-weight:bold; }
.hist-date { font-size:9px; color:var(--gray); margin-top:2px; }
.hist-next { background:#001500; border:1px solid #003300; border-radius:4px; padding:6px 8px; margin-top:6px; font-size:9px; color:#5a9; line-height:1.5; }

/* SKILL CARD */
.skill-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.skill-card { background:var(--surface); border-radius:8px; padding:10px; }
.skill-title { font-size:11px; font-weight:bold; margin-bottom:4px; }
.skill-stage { font-size:9px; color:var(--gray); }
.skill-hold { font-size:16px; font-weight:bold; margin-top:4px; }

/* CHART CONTAINER */
.chart-wrap { position:relative; height:200px; margin:8px 0; }

/* NOTIFICATION */
#toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px);
  background:var(--green-dim); border:1px solid var(--green); border-radius:8px;
  padding:10px 20px; font-size:12px; color:var(--green); font-weight:bold;
  z-index:1000; transition:transform .3s ease; white-space:nowrap;
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* SCANLINES EFFECT ON HEADER */
#header::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
}

/* INSTALL BANNER */
#install-banner {
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:linear-gradient(135deg, #1a0000, #0d0d0d);
  border-top:1px solid var(--red); padding:12px 16px;
  flex-direction:column; gap:8px;
}
#install-banner.show { display:flex; }
#install-banner-title { font-size:12px; font-weight:bold; color:var(--red-bright); letter-spacing:2px; }
#install-banner-sub { font-size:10px; color:#666; }
#install-banner-btns { display:flex; gap:8px; }
/* iOS INSTALL HINT */
#ios-hint {
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:#0d0d0d; border-top:1px solid var(--red);
  padding:14px 16px; text-align:center;
}
#ios-hint.show { display:block; }

  #rank-name { font-size:18px; }
  #xp-total { font-size:24px; }
}

/* FORM GRID */
.form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

/* WEEK PLAN */
.week-row { display:flex; align-items:center; gap:6px; padding:4px 0; border-bottom:1px solid #0f0f0f; font-size:9px; }
.week-num { color:var(--gray); width:22px; flex-shrink:0; }
.week-phase { width:70px; flex-shrink:0; }
.week-workouts { flex:1; display:flex; gap:3px; flex-wrap:wrap; }
.wday { padding:1px 4px; border-radius:3px; font-size:8px; }
</style>
</head>

function defaultState() {
  return {
    workouts: WORKOUT_SEED.map(w => ({...w, done:false, duration:null, intensity:null, rating:null, userNotes:"", nextTraining:"", newPR:false, doneDate:null})),
    exercises: [],
    records: [],
    skills: [],
    bonusXP: 0
  };
}

function loadState() {
  try { const d = localStorage.getItem(SK); return d ? JSON.parse(d) : null; } catch { return null; }
}

function saveState() {
  try { localStorage.setItem(SK, JSON.stringify(state)); } catch {}
}

/* ════════════════════════════════════════════
   CALCULATIONS
════════════════════════════════════════════ */
function getTotalXP() {
  return state.bonusXP +
    state.workouts.filter(w=>w.done).length * 100 +
    state.records.length * 50 +
    state.skills.filter(s=>s.milestone).length * 200;
}

function getRank(xp) {
  let cur = RANKS[0];
  for (const r of RANKS) { if (xp >= r.xp) cur = r; else break; }
  const next = RANKS[cur.lvl + 1];
  const pct = next ? ((xp - cur.xp) / (next.xp - cur.xp)) * 100 : 100;
  return { cur, next, pct: Math.min(pct, 100) };
}

function getStreak() {
  const dates = [...new Set(state.workouts.filter(w=>w.done&&w.doneDate).map(w=>w.doneDate))].sort().reverse();
  if (!dates.length) return 0;
  let streak = 0;
  let cur = new Date(); cur.setHours(0,0,0,0);
  for (const d of dates) {
    const dt = new Date(d); dt.setHours(0,0,0,0);
    const diff = Math.round((cur - dt) / 86400000);
    if (diff <= 1) { streak++; cur = dt; } else break;
  }
  return streak;
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,dd] = d.split('-');
  return `${dd}.${m}.${y}`;
}

/* ════════════════════════════════════════════
   HEADER UPDATE
════════════════════════════════════════════ */
function updateHeader() {
  const xp = getTotalXP();
  const { cur, next, pct } = getRank(xp);
  const streak = getStreak();
  const done = state.workouts.filter(w=>w.done).length;

  document.getElementById('streak-display').textContent = `🔥 ${streak}d STREAK`;
  document.getElementById('done-display').textContent = `${done} / 39 WORKOUTS`;
  document.getElementById('xp-bar').style.width = pct + '%';
}

   TOAST
════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */
function render() {
  const c = document.getElementById('content');
  // Destroy old charts
  Object.values(chartInstances).forEach(ch => { try { ch.destroy(); } catch {} });
  chartInstances = {};

  c.innerHTML = renderTab();
  attachListeners();
  if (currentTab === 'charts') setTimeout(renderCharts, 50);
  updateHeader();
}

function renderTab() {
  switch(currentTab) {
    case 'hq':      return renderHQ();
    case 'log':     return renderLog();
    case 'history': return renderHistory();
    case 'charts':  return renderChartsHTML();
    case 'records': return renderRecords();
    case 'skills':  return renderSkills();
    default:        return renderHQ();
  }
}

function renderCharts() {
  const chartDefaults = {
    plugins: { legend: { labels: { color:'#666', font:{ family:'Courier New', size:10 } } } },
    scales: {
      x: { ticks:{ color:'#444', font:{family:'Courier New',size:9} }, grid:{ color:'#111' } },
      y: { ticks:{ color:'#444', font:{family:'Courier New',size:9} }, grid:{ color:'#111' } }
    }
  };

  const done = [...state.workouts.filter(w=>w.done)].sort((a,b)=>(a.doneDate||'').localeCompare(b.doneDate||''));

  // XP Chart
  let xpCum = 0;
  const xpData = done.map(w => { xpCum += 100+(w.newPR?50:0); return { x:fmtDate(w.doneDate), y:xpCum }; });
  const c1 = document.getElementById('xpChart');
  if (c1 && xpData.length) {
    chartInstances.xp = new Chart(c1, {
      type:'line',
      data:{ labels:xpData.map(d=>d.x), datasets:[{ label:'XP', data:xpData.map(d=>d.y), borderColor:'#eab308', backgroundColor:'rgba(234,179,8,.1)', borderWidth:2, pointRadius:3, pointBackgroundColor:'#eab308', fill:true, tension:.3 }] },
      options:{ ...chartDefaults, responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} } }
    });
  }

  // Weekly workouts
  const weeklyDone = Array.from({length:8},(_,i)=>state.workouts.filter(w=>w.done&&w.week===i+1).length);
  const weeklyTarget = [4,5,5,5,5,5,5,5];
  const c2 = document.getElementById('weekChart');
  if (c2) {
    chartInstances.week = new Chart(c2, {
      type:'bar',
      data:{
        labels:['W1','W2','W3','W4','W5','W6','W7','W8'],
        datasets:[
          { label:'Erledigt', data:weeklyDone, backgroundColor:weeklyDone.map((d,i)=>d>=weeklyTarget[i]?'#22c55e':d>0?'#eab308':'#1a1a1a'), borderRadius:3 },
          { label:'Ziel', data:weeklyTarget, backgroundColor:'transparent', borderColor:'#333', borderWidth:1, type:'line', pointRadius:0 }
        ]
      },
      options:{ ...chartDefaults, responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} } }
    });
  }

  // Type distribution
  const typeCounts = Object.keys(TYPE_COLOR).map(t => state.workouts.filter(w=>w.done&&w.type===t).length);
  const c3 = document.getElementById('typeChart');
  if (c3) {
    chartInstances.type = new Chart(c3, {
      type:'doughnut',
      data:{ labels:Object.keys(TYPE_COLOR), datasets:[{ data:typeCounts, backgroundColor:Object.values(TYPE_COLOR), borderColor:'#000', borderWidth:2 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ color:'#666', font:{family:'Courier New',size:9}, boxWidth:10, padding:8 } } } }
    });
  }

  // Duration
  const durData = done.filter(w=>w.duration).slice(-15);
  const c4 = document.getElementById('durChart');
  if (c4 && durData.length) {
    chartInstances.dur = new Chart(c4, {
      type:'bar',
      data:{ labels:durData.map(w=>w.name.split('—')[0].trim()), datasets:[{ label:'Min', data:durData.map(w=>w.duration), backgroundColor:'#cc0000', borderRadius:3 }] },
      options:{ ...chartDefaults, responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{ legend:{display:false} } }
    });
  }
}

/* ════════════════════════════════════════════

function renderSkills() {
  const latestBySkill = {};
  for (const s of SKILLS_LIST) {
    const sessions = [...state.skills.filter(x=>x.skill===s)].sort((a,b)=>b.date.localeCompare(a.date));
    latestBySkill[s] = sessions[0]||null;
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:9px;color:#555;letter-spacing:2px">${state.skills.filter(s=>s.milestone).length} MEILENSTEINE · +${state.skills.filter(s=>s.milestone).length*200} XP</div>
    <button class="btn btn-yellow" onclick="toggleAddSkill()">${showAddSkill?'✕ ABBRECHEN':'+ SESSION'}</button>
  </div>

  ${showAddSkill ? `
  <div class="card-yellow">
    <div class="card-label label-yellow">🤸 SKILL SESSION EINTRAGEN</div>
    <div class="inp-group"><div class="inp-label">SKILL</div>
      <select class="select" id="sk-skill" onchange="updateSkillStages()">
        ${SKILLS_LIST.map(s=>`<option ${skillForm.skill===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="inp-group"><div class="inp-label">PROGRESSIONSSTUFE</div>
      <select class="select" id="sk-stage">
        ${(SKILL_STAGES[skillForm.skill]||[]).map(s=>`<option ${skillForm.stage===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="form-grid-2">
      <div class="inp-group"><div class="inp-label">HOLD (SEK)</div><input class="inp" type="number" id="sk-hold" value="${skillForm.holdSecs}"></div>
      <div class="inp-group"><div class="inp-label">VERSUCHE</div><input class="inp" type="number" id="sk-att" value="${skillForm.attempts}"></div>
    </div>
    <div class="inp-group"><div class="inp-label">NOTIZEN</div><input class="inp" id="sk-notes" value="${skillForm.notes}" placeholder="..."></div>
    <label class="check-row" style="margin-bottom:10px"><input type="checkbox" id="sk-mile" ${skillForm.milestone?'checked':''}> ⭐ Meilenstein erreicht! (+200 XP)</label>
    <button class="btn btn-yellow btn-full" onclick="saveSkill()">SKILL SESSION SPEICHERN</button>
  </div>
  ` : ''}

  <!-- SKILL OVERVIEW GRID -->
  <div class="skill-grid">
    ${SKILLS_LIST.map(s => {
      const latest = latestBySkill[s];
      const stages = SKILL_STAGES[s];
      const idx = latest ? stages.indexOf(latest.stage) : -1;
      const pct = idx >= 0 ? ((idx+1)/stages.length)*100 : 0;
      const col = SKILL_COLORS[s];
      return `
      <div class="skill-card" style="border:1px solid ${col}22">
        <div class="skill-title" style="color:${col}">${s}</div>
        <div class="skill-stage">${latest ? latest.stage : 'Noch keine Session'}</div>
        ${latest?.holdSecs>0?`<div class="skill-hold" style="color:${col}">${latest.holdSecs}s</div>`:''}
        <div class="prog-bar" style="margin-top:6px"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
        <div style="font-size:8px;color:#444;margin-top:3px">${state.skills.filter(x=>x.skill===s).length} Sessions</div>
      </div>`;
    }).join('')}
  </div>

  <!-- SKILL PROGRESSION TABLE -->
  <div class="card-yellow">
    <div class="card-label label-yellow">🗺️ SKILL ROADMAP</div>
    ${SKILLS_LIST.map(s=>`
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:bold;color:${SKILL_COLORS[s]};margin-bottom:4px">${s}</div>
        <div style="display:flex;gap:3px;flex-wrap:wrap">
          ${SKILL_STAGES[s].map((st,i)=>{
            const latest = latestBySkill[s];
            const cur = SKILL_STAGES[s].indexOf(latest?.stage||'');
            const done = i <= cur;
            return `<div style="padding:2px 6px;border-radius:3px;font-size:8px;background:${done?SKILL_COLORS[s]+'22':'#111'};color:${done?SKILL_COLORS[s]:'#333'};border:1px solid ${done?SKILL_COLORS[s]+'44':'#1a1a1a'}">${st}</div>`;
          }).join('')}
        </div>
      </div>
    `).join('')}
  </div>

  <!-- SKILL HISTORY -->
  ${SKILLS_LIST.map(s => {
    const sessions = [...state.skills.filter(x=>x.skill===s)].sort((a,b)=>b.date.localeCompare(a.date));
    if (!sessions.length) return '';
    return `
    <div class="card">
      <div class="card-label" style="color:${SKILL_COLORS[s]}">${s} — ${sessions.length} Sessions</div>

          </div>
          <span style="color:#444">${fmtDate(ses.date)}</span>
        </div>
      `).join('')}
    </div>`;
  }).join('')}

  ${state.skills.length===0?'<div class="card" style="text-align:center;padding:20px;color:#444;font-size:10px">Nach jeder Skill-Session eintragen — dann siehst du hier deine Progression über Wochen.</div>':''}
  `;
}

/* ════════════════════════════════════════════
   ACTIONS
════════════════════════════════════════════ */
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab===t));
  showAddExercise = false;
  showAddPR = false;
  showAddSkill = false;
  render();
  window.scrollTo(0,0);
}

function selectWorkout(id) {
  selectedWorkoutId = id;
  showAddExercise = false;
  render();
}

function toggleAddEx() {
  showAddExercise = !showAddExercise;
  render();
}

function toggleAddPR() {
  showAddPR = !showAddPR;
  render();
}

function toggleAddSkill() {
  showAddSkill = !showAddSkill;
  render();
}

function setIntensity(val) {
  logForm.intensity = val;
  render();
}

function setRating(n) {
  logForm.rating = n;
  render();
}

function addBonusXP(amount, msg) {
  state.bonusXP += amount;
  saveState();
  showToast(`⚡ ${msg}`);
  updateHeader();
  render();
}

function saveExercise() {
  const name = document.getElementById('ex-name')?.value?.trim();
  if (!name || !selectedWorkoutId) return;
  const ex = {
    id: Date.now(),
    workoutId: selectedWorkoutId,
    date: new Date().toISOString().split('T')[0],
    name,
    sets: +document.getElementById('ex-sets')?.value||0,
    reps: +document.getElementById('ex-reps')?.value||0,
    weight: +document.getElementById('ex-weight')?.value||0,
    pause: +document.getElementById('ex-pause')?.value||0,
    duration: +document.getElementById('ex-dur')?.value||0,
    distance: +document.getElementById('ex-dist')?.value||0,
    variant: document.getElementById('ex-var')?.value||'',
    notes: document.getElementById('ex-notes')?.value||'',
    isPR: document.getElementById('ex-pr')?.checked||false,
  };
  state.exercises.push(ex);
  if (ex.isPR) {
    state.records.push({ id:Date.now()+1, exercise:ex.name, value:ex.weight||ex.reps||ex.duration||0, unit:ex.weight?'kg':'reps', date:ex.date });
    showToast('🏆 Neuer PR gespeichert! +50 XP');
  } else {
    showToast('💪 Übung gespeichert!');
  }
  exForm = { name:'', sets:'', reps:'', weight:'', pause:'', duration:'', distance:'', variant:'', notes:'', isPR:false };
  showAddExercise = false;
  saveState();
  render();
}

function completeWorkout() {
  if (!selectedWorkoutId) return;
  const dur = +document.getElementById('log-dur')?.value||65;
  const notes = document.getElementById('log-notes')?.value||'';
  const next = document.getElementById('log-next')?.value||'';
  const pr = document.getElementById('log-pr')?.checked||false;

  state.workouts = state.workouts.map(w => w.id===selectedWorkoutId ? {
    ...w, done:true, duration:dur, intensity:logForm.intensity, rating:logForm.rating,
    userNotes:notes, nextTraining:next, newPR:pr, doneDate:new Date().toISOString().split('T')[0]
  } : w);

  if (pr) state.bonusXP += 50;
  logForm = { duration:'65', intensity:'🔥 STARK', rating:4, userNotes:'', nextTraining:'', newPR:false };
  selectedWorkoutId = null;
  saveState();
  showToast('⚡ Workout gespeichert! +100 XP');
  setTimeout(() => { currentTab='hq'; render(); }, 300);
}

function savePR() {
  const exercise = document.getElementById('pr-ex')?.value?.trim();
  const value = +document.getElementById('pr-val')?.value||0;
  const unit = document.getElementById('pr-unit')?.value||'reps';
  const notes = document.getElementById('pr-notes')?.value||'';
  if (!exercise || !value) return;
  state.records.push({ id:Date.now(), exercise, value, unit, notes, date:new Date().toISOString().split('T')[0] });
  prForm = { exercise, value:'', unit, notes:'' };
  showAddPR = false;
  saveState();
  showToast('🏆 Record gespeichert! +50 XP');
  render();
}

function deletePR(id) {
  state.records = state.records.filter(r=>r.id!==id);
  saveState();
  render();
}

function saveSkill() {
  const skill = document.getElementById('sk-skill')?.value;
  const stage = document.getElementById('sk-stage')?.value;
  const holdSecs = +document.getElementById('sk-hold')?.value||0;
  const attempts = +document.getElementById('sk-att')?.value||0;
  const milestone = document.getElementById('sk-mile')?.checked||false;
  const notes = document.getElementById('sk-notes')?.value||'';
  if (!skill) return;
  state.skills.push({ id:Date.now(), skill, stage, holdSecs, attempts, milestone, notes, date:new Date().toISOString().split('T')[0] });
  if (milestone) { state.bonusXP += 200; showToast('⭐ Meilenstein! +200 XP'); }
  else showToast('🤸 Skill Session gespeichert!');
  skillForm = { skill, stage, holdSecs:'', attempts:'', milestone:false, notes:'' };
  showAddSkill = false;
  saveState();
  render();
}

function updateSkillStages() {
  const skill = document.getElementById('sk-skill')?.value;
  if (skill) {
    skillForm.skill = skill;
    skillForm.stage = SKILL_STAGES[skill][0];
    const sel = document.getElementById('sk-stage');
    if (sel) { sel.innerHTML = (SKILL_STAGES[skill]||[]).map(s=>`<option>${s}</option>`).join(''); }
  }
}

/* ════════════════════════════════════════════
   EVENT LISTENERS
════════════════════════════════════════════ */
function attachListeners() {
  document.querySelectorAll('.tab').forEach(el => {
    el.onclick = () => switchTab(el.dataset.tab);
  });
}

/* ════════════════════════════════════════════
   PWA SETUP
════════════════════════════════════════════ */
(function() {
  // Generate icon via canvas
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const x = c.getContext('2d');
    // Background
    x.fillStyle = '#000';
    x.fillRect(0,0,size,size);
    // Red border
    const b = size*0.06;
    x.strokeStyle = '#cc0000';
    x.lineWidth = b;
    x.strokeRect(b/2,b/2,size-b,size-b);
    // Skull
    x.font = `${size*0.52}px serif`;
    x.textAlign = 'center';
    x.textBaseline = 'middle';
    x.fillText('☠️', size/2, size*0.46);
    // Label
    x.font = `bold ${size*0.11}px 'Courier New'`;
    x.fillStyle = '#cc0000';
    x.fillText('OPERATOR HQ', size/2, size*0.84);
    return c.toDataURL('image/png');
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);

  // Apple touch icon
  document.getElementById('pwa-icon').href = icon192;

  // Manifest
  const manifest = {
    name: '☠️ OPERATOR HQ',
    short_name: 'OPERATOR HQ',
    description: 'Operator Training Intelligence System — Phase 1',
    start_url: './',
    display: 'standalone',
    background_color: '#000000',
    theme_color: '#000000',
    orientation: 'portrait-primary',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(mBlob);

  // Service Worker (via blob — caches page for offline)
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'operator-hq-cache-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fetchPromise = fetch(e.request).then(res => {
        if (res && res.status === 200) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => cached);
      return cached || fetchPromise;
    })
  );
});`;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => {});
  }

  // Android install prompt
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (banner) banner.classList.add('show');
  });
  const installBtn = document.getElementById('install-btn');
  if (installBtn) {
    installBtn.onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('show');
      if (outcome === 'accepted') showToast('⚡ App installiert!');
    };
  }
  const dismissBtn = document.getElementById('install-dismiss');
  if (dismissBtn) dismissBtn.onclick = () => document.getElementById('install-banner').classList.remove('show');

  window.addEventListener('appinstalled', () => showToast('☠️ OPERATOR HQ installiert!'));

  // iOS hint — show once if not standalone
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone && !localStorage.getItem('ios-hint-shown')) {
    setTimeout(() => {
      const hint = document.getElementById('ios-hint');
      if (hint) hint.classList.add('show');
      localStorage.setItem('ios-hint-shown', '1');
    }, 3000);
  }
})();

// Select next pending workout by default
const nextPending = state.workouts.filter(w=>!w.done).sort((a,b)=>a.date.localeCompare(b.date))[0];
if (nextPending) selectedWorkoutId = nextPending.id;

render();
</script>
